<div class="publications">
  <h2>publications</h2>
    publications by categories in reversed chronological order. generated by jekyll-scholar.
    {% assign years = "2021, 2020, 2019" | split: ", " %}
    {% for y in years %}
      <h2 class="year">{{y}}</h2>
      {% bibliography -f papers -q @*[year={{y}}]* %}
    {% endfor %}
</div>
